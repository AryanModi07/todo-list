<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Todo List</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="light-rays"></div>
<div class="smoke smoke-1"></div>
<div class="smoke smoke-2"></div>
<div class="smoke smoke-3"></div>
<div class="smoke smoke-4"></div>
<div class="smoke smoke-5"></div>
<div class="grain"></div>
<div class="vignette"></div>
<div class="haze"></div>
<div class="confetti-layer" id="confetti-layer"></div>

<div class="card">
  <div class="header">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="3" y="4" width="18" height="17" rx="4" fill="rgba(255,255,255,0.6)" stroke="#5b6cff" stroke-width="1.2"/>
      <path d="M7.5 11.5L9.8 13.8L16.5 7.5" stroke="#5b6cff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="7" y1="16.5" x2="13" y2="16.5" stroke="#5b6cff" stroke-width="1.4" stroke-linecap="round" opacity="0.8"/>
    </svg>
    <h1>My Todo List</h1>
  </div>

  <div class="stats-widget" id="stats-widget">
    <div class="stat">
      <span class="stat-number" id="stat-total">0</span>
      <span class="stat-label">Total</span>
    </div>
    <div class="stat">
      <span class="stat-number" id="stat-active">0</span>
      <span class="stat-label">Active</span>
    </div>
    <div class="stat">
      <span class="stat-number" id="stat-done">0</span>
      <span class="stat-label">Done</span>
    </div>
    <div class="stat-ring">
      <svg viewBox="0 0 60 60">
        <circle class="ring-bg" cx="30" cy="30" r="26"></circle>
        <circle class="ring-fg" id="ring-fg" cx="30" cy="30" r="26"></circle>
      </svg>
      <span class="ring-pct" id="ring-pct">0%</span>
    </div>
  </div>

  <form id="todo-form" novalidate>
    <input type="text" id="task-input" placeholder="Add a new task..." maxlength="100">
    <input type="date" id="due-date-input" class="due-date-input" title="Optional due date">
    <button type="submit" class="add-btn">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="12" y1="5" x2="12" y2="19" stroke="#3a2a6e" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="5" y1="12" x2="19" y2="12" stroke="#3a2a6e" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
      Add
    </button>
  </form>
  <p class="error" id="error-msg"></p>

  <div class="filter-bar" id="filter-bar">
    <div class="filter-tabs">
      <button type="button" class="filter-tab active" data-filter="all">All</button>
      <button type="button" class="filter-tab" data-filter="active">Active</button>
      <button type="button" class="filter-tab" data-filter="completed">Completed</button>
    </div>
    <button type="button" class="clear-completed-btn" id="clear-completed-btn">Clear completed</button>
  </div>

  <ul id="task-list"></ul>
  <p class="empty" id="empty-msg">No tasks yet. Add one above!</p>
  <p class="count" id="count-msg"></p>
</div>

<!-- Animated custom alert dialog (replaces native alert()) -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <div class="modal-icon">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 13l4 4L19 7" stroke="#5b6cff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <p class="modal-message" id="modal-message"></p>
    <button type="button" class="modal-ok-btn" id="modal-ok-btn">OK</button>
  </div>
</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
